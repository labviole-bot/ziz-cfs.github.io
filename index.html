<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Custom Tools Config</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { font-size: 24px; margin-bottom: 1rem; }
        p { color: #86868b; }
        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #e1ffed;
            color: #008037;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WMS Custom Tools</h1>
        <p>Remote Configuration Server</p>
        <div class="status">System Online</div>
    </div>
</body>
</html>
